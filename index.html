 <!DOCTYPE html>
<html>
<head>
    <title>Facebook Login Page</title>
    <style>
        /* Body ka background halka grey */
        body {
            background-color: lightgrey; 
        }

        /* Facebook ki badi heading */
        h1 {
            color: blue; 
            text-align: center;
        }

        /* Safaid rang ka main dabba jo tumne aaj seekha */
        form {
            background-color: white;
            max-width: 350px;
            margin: 50px auto; /* Beech mein lane ke liye */
            padding: 30px;
            border-radius: 15px; /* Gol kone */
            box-shadow: 0px 8px 20px rgba(0, 0, 0, 0.15); /* Saaya */
            text-align: center;
        }
p{
  text-align: end;
  color: blue;
  font-size: medium
}
        /* Inputs ki setting */
        input {
            width: 80%;
            padding: 10px;
            border: 1px solid grey;
            border-radius: 5px;
        }

        /* Blue Button ki setting */
        button {
            width: 60%;
            background-color: blue;
            color: white;
            font-size: 18px;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s; /* Smooth animation */
        }

        /* 🔥 Tumhara pasandida Hover Effect */
        button:hover {
            background-color: darkblue; 
            transform: scale(1.05); /* Hulk nahi, pyara sa bada hoga */
        }
    </style>
</head>
<body>

    <!-- Simple Dhacha jo tumhein aata hai -->
    <form>
        <h1>facebook</h1>
        
        <input type="text" placeholder="Email address or phone number">
        <br><br>
        
        <input type="password" placeholder="Password">
        <br><br>
        
        <button type="submit">Log In</button>
        <br><br>
        
        <a href="#">Forgotten password?</a>
    </form>
<p>Made by Zain</p>
</body>
</html>
